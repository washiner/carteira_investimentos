# application.properties
# Localizaçăo: src/main/resources/application.properties

# ==========================================
# CONFIGURAÇĂO DO BANCO DE DADOS
# ==========================================

# URL de conexăo com o PostgreSQL
# Formato: jdbc:postgresql://host:porta/nome_do_banco
spring.datasource.url=jdbc:postgresql://localhost:5432/carteira_db

# Usuário e senha ? os mesmos do docker-compose.yml
spring.datasource.username=carteira_user
spring.datasource.password=carteira123

# Driver JDBC que o Spring vai usar para se comunicar com o PostgreSQL
spring.datasource.driver-class-name=org.postgresql.Driver

# ==========================================
# CONFIGURAÇĂO DO JPA / HIBERNATE
# ==========================================

# 'validate' = o Hibernate confere se as tabelas existem, mas NĂO cria nada
# Deixamos o Flyway criar as tabelas ? o Hibernate só valida
# Outras opçőes: create, create-drop, update (evite em produçăo)
spring.jpa.hibernate.ddl-auto=validate

# Mostra o SQL gerado pelo Hibernate no console ? ótimo para aprender
spring.jpa.show-sql=true

# Formata o SQL para ficar legível (com quebras de linha e indentaçăo)
spring.jpa.properties.hibernate.format_sql=true

# Dialeto = "sotaque" do SQL que o Hibernate vai usar
# Cada banco tem particularidades ? isso instrui o Hibernate sobre o PostgreSQL
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# ==========================================
# CONFIGURAÇĂO DO FLYWAY
# ==========================================

# Habilita o Flyway (já vem true por padrăo, mas é bom ser explícito)
spring.flyway.enabled=true

# Onde o Flyway vai procurar os arquivos de migration
spring.flyway.locations=classpath:db/migration

# ==========================================
# CONFIGURAÇĂO DO SWAGGER / SPRINGDOC
# ==========================================

# Título da API que aparece na interface do Swagger
springdoc.api-docs.path=/api-docs

# Caminho para acessar a interface visual do Swagger
springdoc.swagger-ui.path=/swagger-ui.html

# Agrupa os endpoints por tag (deixa mais organizado)
springdoc.swagger-ui.tags-sorter=alpha

# Nome da aplicaçăo ? aparece no banner do Spring ao iniciar
spring.application.name=carteira-investimentos